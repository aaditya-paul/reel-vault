version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: reelvault-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reelvault
    ports:
      - "5433:5432"
    volumes:
      - reelvault_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: reelvault-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  reelvault_postgres_data:
